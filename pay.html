<!DOCTYPE html>
<html>
<head>
<title>Payment</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="pay-box">
<h2>Payment Here</h2>

<p id="service"></p>
<p id="price"></p>

<a id="paybtn" class="btn">Pay Now</a>

<p>UPI: sbehhejebns@axl</p>
</div>

<script>
let params = new URLSearchParams(window.location.search);
let service = params.get("service");
let price = params.get("price");

document.getElementById("service").innerText = service;
document.getElementById("price").innerText = "₹"+price;

document.getElementById("paybtn").href =
`upi://pay?pa=sbehhejebns@ibl&pn=SANDEEP%20SINGH&am=${price}`;
</script>

</body>
</html>
