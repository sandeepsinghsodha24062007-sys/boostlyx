<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">Enter Details</div>

<div class="card">
<p>⚠ Enter correct Instagram ID</p>
<input type="text" id="user" placeholder="Enter username">
<button onclick="go()">Continue</button>
</div>

<script>
function go(){
let u=document.getElementById("user").value;
if(u==""){alert("Enter ID");return;}
let p=new URLSearchParams(window.location.search).get("price");
window.location="payment.html?price="+p;
}
</script>

</body>
</html>
