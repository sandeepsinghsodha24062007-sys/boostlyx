<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css?v=10">
</head>

<body>

<div class="header">Enter Details</div>

<div class="service">
<p>Enter your correct Instagram ID</p>
<p>Account must be public</p>

<input type="text" id="user" placeholder="Enter username">

<button class="btn big-btn" onclick="go()">Continue</button>
</div>

<script>
function go(){
let u=document.getElementById("user").value;
if(u==""){alert("Enter ID"); return;}
window.location="payment.html?user="+u+window.location.search;
}
</script>

</body>
</html>
